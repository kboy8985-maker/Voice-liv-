name: StreamYard 24/7 Final Bypass

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fluxbox google-chrome-stable pulseaudio xdotool

      - name: Run Stealth Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          STUDIO_URL: ${{ secrets.STUDIO_URL }}
        run: |
          # 1. Display aur Audio setup
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          pulseaudio --start --exit-idle-time=-1
          fluxbox &
          sleep 5

          # 2. Chrome Stealth Mode (Bypass Signup/Login)
          # Isme --incognito aur automation bypass flags hain
          google-chrome-stable --no-sandbox \
            --no-first-run \
            --no-default-browser-check \
            --incognito \
            --disable-blink-features=AutomationControlled \
            --use-fake-ui-for-media-stream \
            --use-fake-device-for-media-stream \
            --start-maximized \
            --window-size=1920,1080 \
            "$STUDIO_URL" &

          sleep 60 # Page ko poora load hone do

          # --- AUTO CLICKER LOGIC ---
          # A. Cookies hatane ke liye
          xdotool key Escape
          sleep 2
          xdotool key Tab
          sleep 1
          xdotool key Return
          sleep 5

          # B. Name Type Karna (Agar mangta hai)
          xdotool key Tab
          sleep 1
          xdotool type "FAIZ 1611 LIVE"
          sleep 2
          xdotool key Return
          sleep 10

          # C. Final Stage Join (Mic/Cam check bypass)
          xdotool key Return
          sleep 5

          # 3. FFmpeg Streaming
          ffmpeg -f x11grab -video_size 1920x1080 -i :99.0 \
          -f pulse -i default -c:v libx264 -preset veryfast \
          -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &

          sleep 42600s

      - name: Restart
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/streamyard_final.yml/dispatches \
          -d '{"ref":"main"}'
