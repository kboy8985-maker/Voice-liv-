name: Google Meet Ultimate Master

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fluxbox google-chrome-stable pulseaudio xdotool

      - name: Run Master Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MEET_URL: ${{ secrets.MEET_URL }}
        run: |
          # 1. Background System Setup
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          pulseaudio --start --exit-idle-time=-1
          fluxbox &
          sleep 5

          # 2. Chrome Stealth Launch
          google-chrome-stable --no-sandbox \
            --no-first-run \
            --disable-blink-features=AutomationControlled \
            --use-fake-ui-for-media-stream \
            --use-fake-device-for-media-stream \
            --start-maximized \
            "$MEET_URL" &

          sleep 60 # Poora page load hone ka wait

          # --- ERROR-PROOF ENTRY LOGIC ---
          
          # Step A: Saare random pop-ups hatane ke liye Escape
          xdotool key Escape
          sleep 2
          xdotool key Escape
          sleep 2

          # Step B: Screen ke center mein click (Taaki focus browser par aaye)
          xdotool mousemove 960 540 click 1
          sleep 2

          # Step C: 'Name Box' tak pahunchne ka guaranteed rasta (Tab Loop)
          # Hum 5 baar Tab dabayenge taaki focus 'Your Name' par aa jaye
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1

          # Step D: Naam type karna
          xdotool type "FAIZ 1611 LIVE"
          sleep 2

          # Step E: Join Button (Enter)
          xdotool key Return
          sleep 5
          
          # Step F: Ek aur Enter agar 'Ask to join' confirm karna ho
          xdotool key Return
          sleep 10

          # 3. FFmpeg Streaming
          ffmpeg -f x11grab -video_size 1920x1080 -i :99.0 \
          -f pulse -i default -c:v libx264 -preset veryfast \
          -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &

          sleep 42600s

      - name: Auto Restart
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/meet_stream.yml/dispatches \
          -d '{"ref":"main"}'
          
