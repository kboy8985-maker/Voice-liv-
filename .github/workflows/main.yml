name: StreamYard 24/7 Total Stealth

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fluxbox google-chrome-stable pulseaudio xdotool

      - name: Run Stealth Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          STUDIO_URL: ${{ secrets.STUDIO_URL }}
        run: |
          # 1. Background Setup
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          pulseaudio --start --exit-idle-time=-1
          fluxbox &
          sleep 5

          # 2. Chrome Stealth Launch (Sahi Guest Mode)
          # Isme saare wo flags hain jo Chrome ko real dikhayenge
          google-chrome-stable --no-sandbox \
            --no-first-run \
            --disable-blink-features=AutomationControlled \
            --disable-infobars \
            --enable-automation=false \
            --password-store=basic \
            --use-fake-ui-for-media-stream \
            --use-fake-device-for-media-stream \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --start-maximized \
            "$STUDIO_URL" &

          sleep 60

          # 3. AUTO BYPASS (Cookies + Name + Join)
          xdotool key Escape
          sleep 2
          xdotool key Tab
          sleep 1
          xdotool key Return
          sleep 5
          xdotool key Tab
          sleep 1
          xdotool type "FAIZ 1611 LIVE"
          sleep 2
          xdotool key Return
          sleep 10
          xdotool key Return

          # 4. FFmpeg Stream
          ffmpeg -f x11grab -video_size 1920x1080 -i :99.0 \
          -f pulse -i default -c:v libx264 -preset veryfast \
          -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &

          sleep 42600s

      - name: Restart
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/streamyard_final.yml/dispatches \
          -d '{"ref":"main"}'
          
