name: StreamYard 24/7 Auto-Join

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fluxbox google-chrome-stable pulseaudio xdotool

      - name: Run Stealth Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          STUDIO_URL: ${{ secrets.STUDIO_URL }}
        run: |
          # 1. Virtual Display & Audio Setup
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          pulseaudio --start --exit-idle-time=-1
          fluxbox &
          sleep 5

          # 2. Chrome Launch (Saare Popups Bypass)
          google-chrome-stable --no-sandbox \
            --no-first-run \
            --no-default-browser-check \
            --disable-infobars \
            --use-fake-ui-for-media-stream \
            --use-fake-device-for-media-stream \
            --start-maximized \
            "$STUDIO_URL" &

          sleep 50 # Page load hone ka lamba wait

          # --- AUTO CLICK & TYPE LOGIC ---
          
          # A. Cookies Button Bypass (Tab aur Enter se)
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Return
          sleep 5

          # B. Naam Type Karna
          # Ye tab tak Tab dabayega jab tak cursor Name box mein na aa jaye
          xdotool key Tab
          sleep 1
          xdotool type "FAIZ 1611 LIVE"
          sleep 2
          
          # C. Studio Join Button (Enter)
          xdotool key Return
          sleep 8

          # D. Final Stage Join (Enter for Mic/Cam check)
          xdotool key Return
          sleep 5
          
          # --- FFmpeg Streaming to YouTube ---
          ffmpeg -f x11grab -video_size 1920x1080 -i :99.0 \
          -f pulse -i default -c:v libx264 -preset veryfast \
          -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &

          # 11 Hours 50 Minutes Timer
          sleep 42600s

      - name: Auto Restart Workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/streamyard_final.yml/dispatches \
          -d '{"ref":"main"}'
          
