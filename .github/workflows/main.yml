name: Google Meet 24/7 Stream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fluxbox google-chrome-stable pulseaudio xdotool

      - name: Start Environment
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Yahan apna Google Meet Link daalna (e.g., https://meet.google.com/abc-defg-hij)
          MEET_URL: ${{ secrets.MEET_URL }} 
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          pulseaudio --start --exit-idle-time=-1
          fluxbox &
          sleep 5

          # Chrome Launch (Google Meet Mode)
          google-chrome-stable --no-sandbox \
            --no-first-run \
            --use-fake-ui-for-media-stream \
            --use-fake-device-for-media-stream \
            --start-maximized \
            "$MEET_URL" &

          sleep 40 # Meet load hone ka wait

          # --- AUTO JOIN LOGIC ---
          # 1. 'Dismiss' any popups
          xdotool key Escape
          sleep 2
          
          # 2. 'Join Now' button par click karne ke liye Tab + Enter
          # Meet mein aamtaur par 3-4 baar Tab dabane se 'Join' select hota hai
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Tab
          sleep 1
          xdotool key Return
          sleep 5

          # --- FFmpeg Streaming to YouTube ---
          ffmpeg -f x11grab -video_size 1920x1080 -i :99.0 \
          -f pulse -i default -c:v libx264 -preset veryfast \
          -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &

          sleep 42600s

      - name: Restart Workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/meet_stream.yml/dispatches \
          -d '{"ref":"main"}'
          
