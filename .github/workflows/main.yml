name: Google Meet Exact Coordinate Bypass

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fluxbox google-chrome-stable pulseaudio xdotool

      - name: Run Meet Stream
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MEET_URL: ${{ secrets.MEET_URL }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          pulseaudio --start --exit-idle-time=-1
          fluxbox &
          sleep 5

          google-chrome-stable --no-sandbox \
            --no-first-run \
            --disable-blink-features=AutomationControlled \
            --use-fake-ui-for-media-stream \
            --use-fake-device-for-media-stream \
            --start-maximized \
            "$MEET_URL" &

          sleep 60 # Full load hone do

          # --- EXACT MOUSE & KEYBOARD LOGIC ---
          
          # 1. Pehle screen ko activate karne ke liye center click
          xdotool mousemove 960 540 click 1
          sleep 2
          xdotool key Escape # Popups hatane ke liye
          sleep 2

          # 2. EXACT CLICK on "Your Name" Box (Right side middle)
          # 1920x1080 screen par Name box lagbhag yahan hota hai:
          xdotool mousemove 1350 510 click 1
          sleep 2
          
          # 3. Double Check: Tab dabakar box select karna (Backup rasta)
          xdotool key Tab
          sleep 1
          
          # 4. Naam type karna
          xdotool type "FAIZ 1611 LIVE"
          sleep 2
          
          # 5. Join Button par click (Enter)
          xdotool key Return
          sleep 5
          
          # 6. 'Ask to Join' confirm karne ke liye dobara Enter
          xdotool key Return
          sleep 10

          # 3. FFmpeg YouTube Stream
          ffmpeg -f x11grab -video_size 1920x1080 -i :99.0 \
          -f pulse -i default -c:v libx264 -preset veryfast \
          -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" &

          sleep 42600s

      - name: Restart Workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/meet_stream.yml/dispatches \
          -d '{"ref":"main"}'
          
